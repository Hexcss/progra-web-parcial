# cloudbuild.yaml - Despliegue del backend API Flask a Cloud Run

substitutions:
  # Servicio e imagen
  _SERVICE_NAME: "portal-api"
  _REGION: "europe-west1"
  _REPO_NAME: "portal"
  _IMAGE_NAME: "api"
  _RUNTIME_SA: "portal-api@${PROJECT_ID}.iam.gserviceaccount.com"

  # Runtime Flask
  _FLASK_DEBUG: "false"
  _PORT: "8080"
  _WEB_CONCURRENCY: "2"
  _WEB_THREADS: "4"
  _WEB_TIMEOUT: "120"

  # MongoDB
  _MONGO_URI: "mongodb+srv://USER:PASS@CLUSTER/portal?retryWrites=true&w=majority"
  _MONGO_DB_NAME: "portal"

  # JWT y cookies
  _JWT_SECRET_KEY: "changeme-access"
  _COOKIE_SECURE: "true"
  _COOKIE_SAMESITE: "None"

  # Frontend / CORS
  _CORS_ORIGINS: "https://portal-frontend-<region>-<project>.a.run.app"

  # Upload local dentro del contenedor. Para produccion real conviene Cloud Storage.
  _UPLOAD_FOLDER: "/tmp/uploads"
  _MAX_UPLOAD_MB: "10"

steps:
  - id: "build"
    name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-f","Dockerfile",
        "-t","${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_IMAGE_NAME}:$COMMIT_SHA",
        "-t","${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_IMAGE_NAME}:latest",
        "."
      ]

  - id: "push-sha"
    name: "gcr.io/cloud-builders/docker"
    args: ["push", "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_IMAGE_NAME}:$COMMIT_SHA"]
    waitFor: ["build"]

  - id: "push-latest"
    name: "gcr.io/cloud-builders/docker"
    args: ["push", "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_IMAGE_NAME}:latest"]
    waitFor: ["build"]

  - id: "deploy"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    entrypoint: "gcloud"
    args:
      [
        "run","deploy","${_SERVICE_NAME}",
        "--image","${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_IMAGE_NAME}:$COMMIT_SHA",
        "--region","${_REGION}",
        "--platform","managed",
        "--allow-unauthenticated",
        "--service-account","${_RUNTIME_SA}",
        "--max-instances","1",
        "--cpu","1",
        "--memory","512Mi",
        "--timeout","300",
        "--port","${_PORT}",
        "--update-env-vars",
        "FLASK_DEBUG=${_FLASK_DEBUG},PORT=${_PORT},WEB_CONCURRENCY=${_WEB_CONCURRENCY},WEB_THREADS=${_WEB_THREADS},WEB_TIMEOUT=${_WEB_TIMEOUT},MONGO_URI=${_MONGO_URI},MONGO_DB_NAME=${_MONGO_DB_NAME},JWT_SECRET_KEY=${_JWT_SECRET_KEY},COOKIE_SECURE=${_COOKIE_SECURE},COOKIE_SAMESITE=${_COOKIE_SAMESITE},CORS_ORIGINS=${_CORS_ORIGINS},UPLOAD_FOLDER=${_UPLOAD_FOLDER},MAX_UPLOAD_MB=${_MAX_UPLOAD_MB}"
      ]
    waitFor: ["push-sha","push-latest"]

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_IMAGE_NAME}:$COMMIT_SHA"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_IMAGE_NAME}:latest"


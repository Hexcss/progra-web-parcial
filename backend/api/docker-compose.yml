services:
  mongo:
    image: mongo:7
    container_name: portal-api-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: portal
    restart: unless-stopped

  api:
    build: .
    container_name: portal-api
    ports:
      - "4000:4000"
    environment:
      FLASK_DEBUG: "true"
      NODE_ENV: development
      PORT: "4000"
      MONGO_URI: mongodb://mongo:27017/portal
      MONGO_DB_NAME: portal
      JWT_ACCESS_SECRET: change-me-access
      JWT_REFRESH_SECRET: change-me-refresh
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      CORS_ORIGIN: http://localhost:5173
      CLIENT_URL: http://localhost:5173
      COOKIE_SECURE: "false"
      COOKIE_SAMESITE: Lax
      UPLOAD_FOLDER: /app/uploads
      GCS_BUCKET: ${GCS_BUCKET:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-Market <no-reply@hexcss.com>}
      OAUTH_GOOGLE_CLIENT_ID: ${OAUTH_GOOGLE_CLIENT_ID:-}
      OAUTH_GOOGLE_CLIENT_SECRET: ${OAUTH_GOOGLE_CLIENT_SECRET:-}
      OAUTH_GOOGLE_REDIRECT_URI: http://localhost:4000/auth/oauth/google/callback
      OAUTH_GITHUB_CLIENT_ID: ${OAUTH_GITHUB_CLIENT_ID:-}
      OAUTH_GITHUB_CLIENT_SECRET: ${OAUTH_GITHUB_CLIENT_SECRET:-}
      OAUTH_GITHUB_REDIRECT_URI: http://localhost:4000/auth/oauth/github/callback
    volumes:
      - .:/app
      - uploads:/app/uploads
    depends_on:
      - mongo
    command: >
      sh -c "
      python -m app.seed &&
      python run.py
      "
    restart: unless-stopped

volumes:
  mongo-data:
  uploads:
